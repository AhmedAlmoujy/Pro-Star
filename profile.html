<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بروفايل الشركة — Pro-Star KSA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #060614;
      font-family: 'Tajawal', 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: rgba(12, 12, 36, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(232, 98, 28, 0.15);
      flex-shrink: 0;
      z-index: 10;
    }
    .toolbar__right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .toolbar__title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #FFFFFF;
    }
    .toolbar__title span {
      background: linear-gradient(135deg, #E8621C, #FFB347);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .toolbar__pages {
      font-size: 0.85rem;
      color: #B0B0D0;
      font-weight: 500;
    }
    .toolbar__btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      background: linear-gradient(135deg, #E8621C, #C04A10);
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      font-family: inherit;
    }
    .toolbar__btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(232, 98, 28, 0.4);
    }
    .toolbar__btn--nav {
      background: rgba(232, 98, 28, 0.15);
      border: 1px solid rgba(232, 98, 28, 0.3);
      padding: 6px 14px;
      font-size: 0.85rem;
    }
    .toolbar__btn--nav:hover {
      background: rgba(232, 98, 28, 0.25);
    }
    .pdf-viewer {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 20px;
      background: #060614;
    }
    .pdf-viewer canvas {
      max-width: 100%;
      height: auto !important;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      border-radius: 4px;
    }
    .loading {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: #B0B0D0;
    }
    .loading__spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(232, 98, 28, 0.2);
      border-top-color: #E8621C;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading__text {
      font-size: 1rem;
      font-weight: 500;
    }
    .error-msg {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      color: #B0B0D0;
      text-align: center;
      padding: 2rem;
    }
    .error-msg__icon { font-size: 3rem; }
    .error-msg__text { font-size: 1.1rem; line-height: 1.8; }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar__right">
      <a href="index.html" class="toolbar__btn toolbar__btn--nav">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        رجوع
      </a>
      <div class="toolbar__title"><span>Pro-Star</span> بروفايل الشركة</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="toolbar__btn toolbar__btn--nav" id="prev-page">السابق</button>
      <span class="toolbar__pages" id="page-info">-- / --</span>
      <button class="toolbar__btn toolbar__btn--nav" id="next-page">التالي</button>
    </div>
  </div>
  <div id="pdf-container" class="pdf-viewer">
    <div class="loading" id="loading">
      <div class="loading__spinner"></div>
      <div class="loading__text">جارٍ تحميل البروفايل...</div>
    </div>
  </div>

  <script type="module">
    const PDF_URL = '/profile-company.pdf';
    let pdfDoc = null;
    let currentPage = 1;
    let rendering = false;

    async function initPDF() {
      try {
        const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs');
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

        pdfDoc = await pdfjsLib.getDocument(PDF_URL).promise;
        document.getElementById('loading').remove();
        document.getElementById('page-info').textContent = `1 / ${pdfDoc.numPages}`;
        renderAllPages();
      } catch (err) {
        console.error('PDF load error:', err);
        const container = document.getElementById('pdf-container');
        container.innerHTML = `
          <div class="error-msg">
            <div class="error-msg__icon">📄</div>
            <p class="error-msg__text">تعذر تحميل البروفايل</p>
            <a href="${PDF_URL}" class="toolbar__btn" download>تحميل البروفايل</a>
          </div>
        `;
      }
    }

    async function renderAllPages() {
      const container = document.getElementById('pdf-container');
      container.innerHTML = '';
      for (let i = 1; i <= pdfDoc.numPages; i++) {
        const page = await pdfDoc.getPage(i);
        const viewport = page.getViewport({ scale: 1.5 });
        const canvas = document.createElement('canvas');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        canvas.dataset.page = i;
        container.appendChild(canvas);
        const ctx = canvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport }).promise;
      }
    }

    document.getElementById('prev-page').addEventListener('click', () => {
      const canvases = document.querySelectorAll('#pdf-container canvas');
      if (currentPage > 1) {
        currentPage--;
        canvases[currentPage]?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        document.getElementById('page-info').textContent = `${currentPage} / ${pdfDoc.numPages}`;
      }
    });

    document.getElementById('next-page').addEventListener('click', () => {
      const canvases = document.querySelectorAll('#pdf-container canvas');
      if (currentPage < pdfDoc.numPages) {
        currentPage++;
        canvases[currentPage - 1]?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        document.getElementById('page-info').textContent = `${currentPage} / ${pdfDoc.numPages}`;
      }
    });

    initPDF();
  </script>
</body>
</html>
